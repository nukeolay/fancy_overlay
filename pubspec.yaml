name: fancy_overlay
description: "A Flutter package that provides a collection of stunning, customizable overlays to enhance your app's visual appeal."
version: 0.1.2
homepage: https://github.com/nukeolay/fancy_overlay
repository: https://github.com/nukeolay/fancy_overlay

environment:
  sdk: '>=3.1.2 <4.0.0'
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  shaders:
    - shaders/pixelize.frag
    - shaders/vhs_crt.frag
    - shaders/liquid_distortion.frag

topics:
  - overlay
  - effects
  - pixelize
  - snowfall
  - shaders
